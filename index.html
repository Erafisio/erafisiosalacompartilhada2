<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FisioSalas Pro v6.1 - Gestão Integrada Cloud</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; padding: 20px; }
        #cloud-status { position: fixed; top: 10px; right: 10px; padding: 10px; border-radius: 8px; font-weight: bold; }
        .sync-active { background: #f39c12; color: white; }
        .success { background: #28a745; color: white; }
        .error { background: #dc3545; color: white; }
        .container { max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
<div id="cloud-status">Aguardando...</div>

<div class="container">
    <h1>FisioSalas Pro v6.1</h1>
    <p>Versão de teste para verificar conexão com a nuvem.</p>
    <button onclick="fetchFromCloud()">🔄 Testar Conexão com Nuvem</button>
    <div id="result" style="margin-top:20px; padding:15px; border:1px solid #ddd; border-radius:8px;"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuOF6wm1apcxjGAli5hxhg1laYM8xwo-pCvFun_mPycVd760eHb5-2hmZvxF1jIgUr/exec";

async function fetchFromCloud() {
    const status = document.getElementById('cloud-status');
    const resultDiv = document.getElementById('result');
    
    status.className = 'sync-active';
    status.innerText = '☁️ Tentando conectar...';
    resultDiv.innerHTML = 'Carregando...';

    try {
        const response = await fetch(SCRIPT_URL, { 
            method: 'GET', 
            cache: 'no-cache' 
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        resultDiv.innerHTML = `
            <strong style="color:green">✅ Conexão bem-sucedida!</strong><br><br>
            Profissionais: ${data.profissionais ? data.profissionais.length : 0}<br>
            Reservas: ${data.bookings ? data.bookings.length : 0}<br>
            Salas: ${data.salas ? data.salas.length : 0}<br><br>
            <pre style="background:#f4f4f4; padding:10px; font-size:12px;">${JSON.stringify(data, null, 2)}</pre>
        `;

        status.className = 'success';
        status.innerText = '✅ CONECTADO';

    } catch (e) {
        console.error(e);
        resultDiv.innerHTML = `
            <strong style="color:red">❌ Erro ao conectar:</strong><br>
            ${e.message}<br><br>
            URL usada: ${SCRIPT_URL}
        `;
        status.className = 'error';
        status.innerText = '❌ FALHA';
    }
}

// Executa automaticamente ao carregar
window.onload = fetchFromCloud;
</script>
</body>
</html>
